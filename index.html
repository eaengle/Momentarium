<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#06080f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Momentarium">
  <title>Momentarium</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* Expose safe area insets as CSS custom properties for JS to read */
    :root {
      --sat: env(safe-area-inset-top,    0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left,   0px);
      --sar: env(safe-area-inset-right,  0px);
    }

    html, body {
      width: 100%; height: 100%;
      background: #04060c;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #c {
      display: block;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    #hint {
      position: fixed;
      bottom: max(28px, calc(env(safe-area-inset-bottom) + 28px));
      width: 100%;
      text-align: center;
      color: rgba(160, 185, 230, 0.32);
      font: 10px/1 -apple-system, system-ui, 'Helvetica Neue', sans-serif;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 2s ease;
    }
    #hint.fade { opacity: 0; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <p id="hint">swipe to explore &middot; tap to stir</p>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator && /^https?:/.test(location.protocol)) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
