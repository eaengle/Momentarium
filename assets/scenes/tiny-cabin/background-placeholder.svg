<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#060e1a"/>
      <stop offset="60%"  stop-color="#0d1c30"/>
      <stop offset="100%" stop-color="#152840"/>
    </linearGradient>
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#c8daea"/>
      <stop offset="100%" stop-color="#dce8f4"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="hsla(145,90%,55%,0)"/>
      <stop offset="25%"  stop-color="hsla(148,96%,68%,0.22)"/>
      <stop offset="50%"  stop-color="hsla(155,88%,62%,0.30)"/>
      <stop offset="75%"  stop-color="hsla(220,84%,60%,0.18)"/>
      <stop offset="100%" stop-color="hsla(290,74%,55%,0)"/>
    </linearGradient>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="rgba(255,252,210,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,252,210,0)"/>
    </radialGradient>
    <radialGradient id="winGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="rgba(255,185,60,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,185,60,0)"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="540" height="960" fill="url(#sky)"/>

  <!-- Aurora band -->
  <rect x="0" y="40" width="540" height="240" fill="url(#aurora)" filter="url(#blur4)" opacity="0.85"/>

  <!-- Stars -->
  <circle cx="62"  cy="72"  r="1.4" fill="white" opacity="0.80"/>
  <circle cx="128" cy="48"  r="1.0" fill="white" opacity="0.60"/>
  <circle cx="195" cy="92"  r="1.6" fill="white" opacity="0.85"/>
  <circle cx="254" cy="60"  r="1.0" fill="white" opacity="0.65"/>
  <circle cx="318" cy="82"  r="1.3" fill="white" opacity="0.75"/>
  <circle cx="378" cy="50"  r="0.9" fill="white" opacity="0.55"/>
  <circle cx="440" cy="88"  r="1.5" fill="white" opacity="0.80"/>
  <circle cx="498" cy="64"  r="1.0" fill="white" opacity="0.60"/>
  <circle cx="88"  cy="130" r="0.9" fill="white" opacity="0.50"/>
  <circle cx="158" cy="150" r="1.2" fill="white" opacity="0.65"/>
  <circle cx="310" cy="138" r="0.9" fill="white" opacity="0.55"/>
  <circle cx="462" cy="144" r="1.1" fill="white" opacity="0.60"/>
  <circle cx="520" cy="120" r="0.8" fill="white" opacity="0.45"/>

  <!-- Moon -->
  <circle cx="420" cy="100" r="56" fill="url(#moonGlow)"/>
  <circle cx="420" cy="100" r="26" fill="#fffde4"/>
  <circle cx="430" cy="90"  r="23" fill="#0d1a2e"/>

  <!-- Back mountain range (dark blue) -->
  <polygon points="0,580 70,430 130,510 200,390 280,480 350,400 430,470 500,420 540,460 540,620 0,620"
    fill="#101f34"/>

  <!-- Mid mountain range -->
  <polygon points="0,610 90,500 180,555 270,490 360,548 450,496 540,530 540,650 0,650"
    fill="#142842"/>

  <!-- Snow ground -->
  <rect x="0" y="710" width="540" height="250" fill="url(#snow)"/>
  <rect x="0" y="700" width="540" height="18" fill="rgba(220,232,244,0.5)"/>

  <!-- Left pine tree -->
  <polygon points="108,710 124,620 142,710" fill="#152d1e"/>
  <polygon points="110,680 124,600 138,680" fill="#152d1e"/>
  <polygon points="112,650 124,590 136,650" fill="#152d1e"/>
  <polygon points="116,640 124,606 132,640" fill="#c5d6e8" opacity="0.9"/>

  <!-- Right pine tree -->
  <polygon points="396,710 414,614 430,710" fill="#152d1e"/>
  <polygon points="398,678 414,596 428,678" fill="#152d1e"/>
  <polygon points="400,648 414,586 428,648" fill="#152d1e"/>
  <polygon points="405,638 414,603 423,638" fill="#c5d6e8" opacity="0.9"/>

  <!-- Far left pine -->
  <polygon points="48,710 62,640 76,710"  fill="#0e2218"/>
  <polygon points="52,685 62,628 72,685"  fill="#0e2218"/>
  <polygon points="54,660 62,636 70,660"  fill="#b8cfe2" opacity="0.7"/>

  <!-- Far right pine -->
  <polygon points="464,710 478,640 490,710" fill="#0e2218"/>
  <polygon points="466,685 478,628 488,685" fill="#0e2218"/>
  <polygon points="468,660 478,636 488,660" fill="#b8cfe2" opacity="0.7"/>

  <!-- Cabin body -->
  <rect x="214" y="596" width="112" height="114" fill="#4a3628"/>
  <!-- Cabin log lines -->
  <line x1="214" y1="624" x2="326" y2="624" stroke="rgba(0,0,0,0.22)" stroke-width="1"/>
  <line x1="214" y1="652" x2="326" y2="652" stroke="rgba(0,0,0,0.22)" stroke-width="1"/>
  <line x1="214" y1="680" x2="326" y2="680" stroke="rgba(0,0,0,0.22)" stroke-width="1"/>

  <!-- Roof -->
  <polygon points="200,598 270,530 340,598" fill="#1e1e1e"/>
  <polygon points="204,598 270,534 336,598" fill="#c5d6e8"/>

  <!-- Chimney -->
  <rect x="282" y="548" width="16" height="44" fill="#6b4c3b"/>

  <!-- Window glow halos -->
  <circle cx="246" cy="620" r="28" fill="url(#winGlow)"/>
  <circle cx="296" cy="620" r="26" fill="url(#winGlow)"/>

  <!-- Left window -->
  <rect x="232" y="608" width="28" height="26" fill="#f9c85a"/>
  <line x1="246" y1="608" x2="246" y2="634" stroke="#3d2d1e" stroke-width="2"/>
  <line x1="232" y1="621" x2="260" y2="621" stroke="#3d2d1e" stroke-width="2"/>

  <!-- Right window -->
  <rect x="280" y="608" width="28" height="26" fill="#f9c85a"/>
  <line x1="294" y1="608" x2="294" y2="634" stroke="#3d2d1e" stroke-width="2"/>
  <line x1="280" y1="621" x2="308" y2="621" stroke="#3d2d1e" stroke-width="2"/>

  <!-- Door -->
  <rect x="256" y="660" width="28" height="50" fill="#5c3318" rx="4"/>
  <rect x="253" y="658" width="34" height="52" fill="none" stroke="#1a0c05" stroke-width="3" rx="5"/>
  <circle cx="283" cy="688" r="3" fill="#c8a050"/>

  <!-- Porch step -->
  <rect x="246" y="710" width="48" height="10" fill="#2c1808"/>
  <rect x="246" y="710" width="48" height="3"  fill="rgba(205,222,238,0.5)"/>

  <!-- Frozen pond (lower left) -->
  <ellipse cx="130" cy="768" rx="78" ry="24" fill="#8ab4cc" opacity="0.8"/>
  <ellipse cx="130" cy="760" rx="78" ry="14" fill="rgba(210,235,248,0.4)"/>

  <!-- Snow drifts foreground -->
  <ellipse cx="420" cy="730" rx="72" ry="22" fill="rgba(232,243,252,0.85)"/>
  <ellipse cx="82"  cy="745" rx="58" ry="18" fill="rgba(232,243,252,0.80)"/>
  <ellipse cx="270" cy="755" rx="90" ry="20" fill="rgba(235,245,254,0.70)"/>
</svg>
